# Name uniquely identifies this experiment — change it to start a fresh dataset.
name: "Trolley Problem"

variants:
  A:
    title: "Classic Trolley Problem"
    text: |
      A runaway trolley is speeding toward 5 people tied to the tracks.
      You are standing next to a lever. If you pull it, the trolley will
      be diverted to a side track where only 1 person is tied.

  B:
    title: "Footbridge Dilemma"
    text: |
      A runaway trolley is speeding toward 5 people tied to the tracks.
      You are standing on a footbridge above the tracks, next to a large
      stranger. The only way to stop the trolley is to push him off the
      bridge — his body will stop it, but he will die.

questions:
  - id: act
    text: "Would you take the action (divert/push)?"
    answer_type: choice
    answer_options: ["Yes", "No"]

  - id: reason_yes
    text: "What's your main reason for acting?"
    answer_type: choice
    answer_options: ["Minimize total harm", "Moral duty to intervene", "Instinct"]
    if:
      act: "Yes"

  - id: reason_no
    text: "What's your main reason for not acting?"
    answer_type: choice
    answer_options: ["Wrong to directly cause harm", "Not my responsibility", "Instinct"]
    if:
      act: "No"

  - id: confidence
    text: "How confident are you in your answer?"
    answer_type: choice
    answer_options: ["Very confident", "Somewhat confident", "Uncertain"]

  - id: reflection
    text: "Anything else you'd like to add?"
    answer_type: freetext
    optional: true
